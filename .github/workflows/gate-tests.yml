name: Gate tests

on:
  pull_request:
    paths:
      - '.claude/hooks/executor-stop-gate.ps1'
      - '.claude/settings.json'
      - 'tests/**'
      - '.github/workflows/gate-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pester >= 5
        run: |
          $existing = Get-Module -ListAvailable -Name Pester |
            Where-Object { $_.Version -ge [version]'5.0.0' } |
            Sort-Object Version -Descending |
            Select-Object -First 1

          if (-not $existing) {
            Write-Host 'Pester >= 5 not found on this runner; installing...'
            Install-Module Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck -Scope CurrentUser
          } else {
            Write-Host "Found Pester $($existing.Version) already available."
          }

          Import-Module Pester -MinimumVersion 5.0.0 -Force
          Write-Host "Using Pester $((Get-Module Pester).Version)"

      - name: Run gate tests
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -Force

          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'tests/gate.Tests.ps1'
          $cfg.Run.PassThru = $true
          $cfg.Output.Verbosity = 'Detailed'

          $result = Invoke-Pester -Configuration $cfg

          Write-Host "Gate tests: $($result.PassedCount) passed, $($result.FailedCount) failed, $($result.SkippedCount) skipped"

          # Hard requirement: a failing test must fail the job. Invoke-Pester's own exit code is
          # not reliable across hosts, so propagate explicitly from the PassThru result.
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) gate test(s) failed."
            exit 1
          }

          exit 0
